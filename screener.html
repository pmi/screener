<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stocks Screener</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FAFAF7;
  --surface: #FFFFFF;
  --surface-2: #F4F2EC;
  --border: #E8E6E0;
  --border-strong: #D4D2CC;
  --text: #161616;
  --text-muted: #6B6B6B;
  --text-faint: #A8A6A0;
  --accent: #2D5F3F;
  --accent-soft: rgba(45,95,63,.10);
  --pass: #2D7A47;
  --pass-soft: rgba(45,122,71,.10);
  --fail: #B8392C;
  --fail-soft: rgba(184,57,44,.08);
  --warn: #A8771F;
  --warn-soft: rgba(168,119,31,.10);
  --shadow: 0 1px 2px rgba(0,0,0,.04);
  --input-bg: #FFFFFF;
  --row-alt: rgba(0,0,0,.018);
  --highlight: #FFF6CE;
  --highlight-soft: rgba(255,222,80,.18);
}
[data-theme="dark"] {
  --bg: #0D0E0F;
  --surface: #161719;
  --surface-2: #1B1D20;
  --border: #25272A;
  --border-strong: #3A3D42;
  --text: #ECECE9;
  --text-muted: #8A8C90;
  --text-faint: #585A5E;
  --accent: #87C195;
  --accent-soft: rgba(135,193,149,.12);
  --pass: #7AC288;
  --pass-soft: rgba(122,194,136,.12);
  --fail: #E0716A;
  --fail-soft: rgba(224,113,106,.10);
  --warn: #D9A968;
  --warn-soft: rgba(217,169,104,.12);
  --shadow: 0 1px 2px rgba(0,0,0,.4);
  --input-bg: #1B1D20;
  --row-alt: rgba(255,255,255,.02);
  --highlight: #3A2F0E;
  --highlight-soft: rgba(217,169,104,.10);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: 'IBM Plex Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  transition: background-color .25s ease, color .25s ease;
}
.mono { font-family: 'IBM Plex Mono', monospace; font-variant-numeric: tabular-nums; }
.serif { font-family: 'Fraunces', serif; font-optical-sizing: auto; }
.serif-italic { font-family: 'Fraunces', serif; font-style: italic; font-optical-sizing: auto; }

/* ---- Header ---- */
header.app {
  position: sticky; top: 0; z-index: 50;
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 36px 16px;
  background: color-mix(in srgb, var(--bg) 88%, transparent);
  border-bottom: 1px solid var(--border);
  backdrop-filter: saturate(160%) blur(10px);
  -webkit-backdrop-filter: saturate(160%) blur(10px);
}
header.app .brand h1 {
  font-family: 'Fraunces', serif;
  font-weight: 400;
  font-size: 32px;
  letter-spacing: -.018em;
  margin: 0;
  font-variation-settings: "opsz" 144;
  line-height: 1.1;
}
header.app .brand h1 em {
  font-style: italic;
  color: var(--accent);
  font-variation-settings: "opsz" 144;
  margin-right: 2px;
}
header.app .brand .tag {
  font-size: 11px;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--text-faint);
  margin-top: 4px;
}
.header-right { display: flex; align-items: center; gap: 12px; }
.profile-pill {
  display: flex; align-items: center; gap: 12px;
  padding: 8px 6px 8px 16px;
  border: 1px solid var(--border-strong);
  border-radius: 999px;
  background: var(--surface);
  transition: border-color .2s ease;
}
.profile-pill:hover { border-color: var(--text-muted); }
.profile-pill label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: .18em;
  color: var(--text-muted);
}
.profile-pill .select-wrap { position: relative; display: flex; align-items: center; }
.profile-pill select {
  appearance: none; -webkit-appearance: none;
  border: none; background: var(--surface-2);
  color: var(--text);
  font-family: 'IBM Plex Sans'; font-weight: 500; font-size: 13px;
  cursor: pointer;
  padding: 6px 30px 6px 14px;
  border-radius: 999px;
}
.profile-pill .chev { position: absolute; right: 10px; pointer-events: none; opacity: .6; }
.icon-btn {
  width: 38px; height: 38px;
  border: 1px solid var(--border-strong);
  border-radius: 999px;
  background: var(--surface);
  cursor: pointer;
  display: grid; place-items: center;
  color: var(--text);
  transition: transform .2s ease, border-color .2s ease, background .2s ease;
}
.icon-btn:hover { border-color: var(--text-muted); }
.icon-btn:active { transform: scale(.92); }
.icon-btn svg { width: 16px; height: 16px; }

/* ---- Tabs ---- */
nav.tabs {
  display: flex;
  padding: 0 32px;
  border-bottom: 1px solid var(--border);
  background: color-mix(in srgb, var(--bg) 92%, transparent);
  overflow-x: auto;
  position: sticky; top: 80px; z-index: 40;
  backdrop-filter: saturate(160%) blur(8px);
  -webkit-backdrop-filter: saturate(160%) blur(8px);
}
nav.tabs::-webkit-scrollbar { display: none; }
nav.tabs button {
  background: transparent; border: none;
  font-family: 'IBM Plex Sans'; color: var(--text-muted);
  font-size: 12.5px; font-weight: 500;
  padding: 14px 14px 16px;
  cursor: pointer;
  letter-spacing: .02em;
  position: relative;
  transition: color .15s ease;
  white-space: nowrap;
  display: inline-flex; align-items: center; gap: 8px;
}
nav.tabs button:hover { color: var(--text); }
nav.tabs button.active { color: var(--text); }
nav.tabs button.active::after {
  content: ""; position: absolute; left: 14px; right: 14px; bottom: -1px;
  height: 2px; background: var(--accent);
}
nav.tabs .roman {
  font-family: 'Fraunces', serif; font-style: italic;
  font-size: 11px; color: var(--text-faint);
  font-variation-settings: "opsz" 9;
}

/* ---- Main ---- */
main { padding: 28px 36px 64px; max-width: 1680px; margin: 0 auto; }
section.panel { display: none; }
section.panel.active { display: block; animation: fadeIn .28s ease both; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: none; }
}

.panel-header { margin-bottom: 22px; display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; flex-wrap: wrap; }
.panel-header h2 {
  font-family: 'Fraunces', serif;
  font-weight: 400;
  font-size: 32px;
  letter-spacing: -.022em;
  margin: 0 0 4px;
  line-height: 1.05;
  font-variation-settings: "opsz" 144;
}
.panel-header h2 em { font-style: italic; color: var(--accent); }
.panel-header .stage { font-size: 11px; letter-spacing: .18em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 10px; }
.panel-header p { color: var(--text-muted); margin: 6px 0 0; max-width: 720px; }
.panel-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

button.btn, a.btn {
  border: 1px solid var(--border-strong);
  background: var(--surface);
  color: var(--text);
  padding: 8px 14px;
  font-size: 12px;
  font-family: 'IBM Plex Sans';
  font-weight: 500;
  letter-spacing: .01em;
  border-radius: 6px;
  cursor: pointer;
  transition: all .15s ease;
  display: inline-flex; align-items: center; gap: 6px;
  text-decoration: none;
}
button.btn:hover, a.btn:hover { border-color: var(--text-muted); background: var(--surface-2); }
button.btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
[data-theme="dark"] button.btn.primary { color: #0D0E0F; }
button.btn.primary:hover { filter: brightness(1.08); }
button.btn.subtle { border-color: transparent; background: transparent; color: var(--text-muted); padding: 6px 10px; }
button.btn.subtle:hover { color: var(--text); background: var(--surface-2); }
button.btn.danger:hover { border-color: var(--fail); color: var(--fail); }

/* ---- Card / Table ---- */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 0;
  overflow: hidden;
  margin-bottom: 18px;
}
.card-title-row {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  background: var(--surface);
}
.card-title-row .kicker {
  font-size: 10px; letter-spacing: .18em; text-transform: uppercase; color: var(--text-muted);
}
.card-title-row .title {
  font-family: 'Fraunces', serif;
  font-weight: 400;
  font-size: 18px;
  margin-top: 2px;
  font-variation-settings: "opsz" 36;
}
.card-title-row .title em { font-style: italic; color: var(--accent); }

.table-wrap { overflow: auto; max-width: 100%; }
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
th, td {
  border-bottom: 1px solid var(--border);
  padding: 9px 12px;
  text-align: right;
  vertical-align: middle;
  white-space: nowrap;
}
th {
  font-weight: 500;
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--text-muted);
  background: var(--surface);
  border-bottom: 1px solid var(--border-strong);
  position: sticky; top: 0;
  z-index: 2;
}
th.group {
  background: var(--surface-2);
  text-align: center;
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 400;
  letter-spacing: .04em;
  color: var(--text);
  text-transform: none;
  font-size: 12px;
}
th.left, td.left { text-align: left; }
tbody tr:hover td { background: var(--row-alt); }
td.numeric, th.numeric {
  font-family: 'IBM Plex Mono'; font-variant-numeric: tabular-nums;
}
td.dim { color: var(--text-muted); }
td.idx { color: var(--text-faint); font-family: 'IBM Plex Mono'; font-size: 11px; text-align: center; }
td.ticker { font-family: 'IBM Plex Mono'; font-weight: 500; text-align: left; }
td.section-row {
  background: var(--surface-2);
  font-size: 10px; text-transform: uppercase; letter-spacing: .15em;
  color: var(--accent);
  font-weight: 600;
  text-align: left;
  padding: 14px 12px 8px;
  border-bottom: 1px solid var(--border-strong);
}
td.note { color: var(--text-muted); font-style: italic; font-size: 12px; text-align: left; }

input.cell, select.cell {
  width: 100%;
  background: transparent;
  border: 1px solid transparent;
  padding: 5px 8px;
  font-family: 'IBM Plex Mono';
  font-size: 13px;
  color: var(--text);
  text-align: right;
  border-radius: 4px;
  font-variant-numeric: tabular-nums;
  min-width: 64px;
}
input.cell:hover, select.cell:hover { border-color: var(--border); }
input.cell:focus, select.cell:focus {
  outline: none;
  border-color: var(--accent);
  background: var(--input-bg);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
input.cell.text { text-align: left; font-family: 'IBM Plex Sans'; }
select.cell { text-align: left; font-family: 'IBM Plex Sans'; appearance: auto; min-width: 80px; cursor: pointer; }
input.cell.override-input { background: var(--highlight-soft); }
input.cell.override-input:focus { background: var(--input-bg); }

/* ---- Status badges ---- */
.dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; vertical-align: middle; }
.dot.pass { background: var(--pass); }
.dot.fail { background: var(--fail); }
.dot.empty { background: var(--border-strong); }

.pill {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 2px 9px 2px 8px;
  border-radius: 999px;
  font-size: 10.5px;
  font-weight: 600;
  font-family: 'IBM Plex Sans';
  letter-spacing: .08em;
  text-transform: uppercase;
}
.pill.pass { color: var(--pass); background: var(--pass-soft); }
.pill.fail { color: var(--fail); background: var(--fail-soft); }
.pill.warn { color: var(--warn); background: var(--warn-soft); }
.pill.buy { color: var(--pass); background: var(--pass-soft); border: 1px solid var(--pass); }
.pill.watch { color: var(--warn); background: var(--warn-soft); border: 1px solid var(--warn); }
.pill.reject { color: var(--fail); background: var(--fail-soft); border: 1px solid var(--fail); }
.pill.empty { color: var(--text-faint); background: transparent; border: 1px dashed var(--border-strong); }
.pill.neutral { color: var(--text-muted); background: var(--surface-2); }

td.gate { text-align: center; padding: 8px; }
td.gate.pass { background: var(--pass-soft); color: var(--pass); }
td.gate.fail { background: var(--fail-soft); color: var(--fail); }
td.gate.empty { color: var(--text-faint); }

/* ---- Setup specific ---- */
.setup-header-row, .setup-row {
  display: grid;
  grid-template-columns: minmax(280px,1.6fr) 90px 100px 90px repeat(5, 80px) minmax(140px,1.2fr);
  gap: 0;
  align-items: center;
}
.setup-header-row {
  position: sticky; top: auto; z-index: 5;
  background: var(--surface);
  border-bottom: 1px solid var(--border-strong);
  padding: 14px 4px 12px;
}
.setup-header-row > div {
  font-size: 10.5px; text-transform: uppercase; letter-spacing: .1em; color: var(--text-muted);
  text-align: right; padding: 0 12px;
}
.setup-header-row .label { text-align: left; }
.setup-header-row .note-h { text-align: left; }
.setup-row {
  border-bottom: 1px solid var(--border);
  padding: 5px 4px;
  transition: background .15s ease;
}
.setup-row:hover { background: var(--row-alt); }
.setup-row .label { font-size: 13px; padding: 0 12px; }
.setup-row .num { text-align: right; padding: 0 12px; font-family: 'IBM Plex Mono'; font-size: 13px; font-variant-numeric: tabular-nums; }
.setup-row .num.active { color: var(--text); font-weight: 600; }
.setup-row .num.default { color: var(--text-muted); }
.setup-row .num.profcol { color: var(--text-faint); font-size: 12px; }
.setup-row .num.profcol.active { color: var(--accent); font-weight: 600; }
.setup-row .note { color: var(--text-muted); font-size: 12px; font-style: italic; padding: 0 12px; text-align: left; white-space: normal; line-height: 1.35; }
.setup-row .override-cell { padding: 0 8px; }
.setup-section {
  font-size: 10.5px; text-transform: uppercase; letter-spacing: .16em;
  color: var(--accent);
  font-weight: 600;
  padding: 22px 12px 8px;
  border-bottom: 1px solid var(--accent);
  margin-top: 4px;
}
.setup-section:first-of-type { margin-top: 0; }
.setup-section em {
  font-family: 'Fraunces', serif; font-style: italic; font-weight: 400;
  color: var(--text-muted); font-size: 11px; letter-spacing: 0; margin-left: 10px;
  text-transform: none;
}

/* ---- Summary stat strip ---- */
.stat-strip {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 18px;
}
.stat-strip .stat {
  background: var(--surface);
  padding: 14px 16px;
}
.stat-strip .stat .k {
  font-size: 10px; letter-spacing: .15em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 4px;
}
.stat-strip .stat .v {
  font-family: 'Fraunces', serif;
  font-size: 24px;
  font-weight: 400;
  letter-spacing: -.01em;
  font-variation-settings: "opsz" 36;
}
.stat-strip .stat .v.mono { font-family: 'IBM Plex Mono'; font-size: 20px; font-weight: 500; }
.stat-strip .stat .v em { font-style: italic; color: var(--accent); }
.stat-strip .stat .v.pass { color: var(--pass); }
.stat-strip .stat .v.fail { color: var(--fail); }

/* ---- Inputs panel toolbar ---- */
.toolbar {
  display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--surface-2);
}
.toolbar .group { display: flex; gap: 6px; align-items: center; }
.toolbar .spacer { flex: 1; }
.toolbar .hint { font-size: 11.5px; color: var(--text-muted); letter-spacing: .02em; }

/* ---- Footer ---- */
footer.app {
  padding: 32px 36px;
  color: var(--text-faint);
  font-size: 11px;
  letter-spacing: .12em;
  text-transform: uppercase;
  border-top: 1px solid var(--border);
  margin-top: 40px;
  text-align: center;
}
footer.app .rule {
  width: 60px; height: 1px; background: var(--accent); margin: 0 auto 14px;
}

/* ---- Empty state ---- */
.empty-state {
  padding: 60px 20px;
  text-align: center;
  color: var(--text-muted);
}
.empty-state .title {
  font-family: 'Fraunces', serif; font-style: italic; font-size: 20px; color: var(--text);
  margin-bottom: 8px;
}

/* ---- Scrollbar styling (subtle) ---- */
* { scrollbar-width: thin; scrollbar-color: var(--border-strong) transparent; }
*::-webkit-scrollbar { height: 8px; width: 8px; }
*::-webkit-scrollbar-track { background: transparent; }
*::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }

/* ---- Fetch bar (Inputs panel) ---- */
.fetch-bar {
  display: flex; gap: 18px; align-items: center; flex-wrap: wrap;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  background: var(--surface-2);
}
.fetch-bar .group { display: flex; gap: 8px; align-items: center; }
.fetch-bar label {
  font-size: 10px; text-transform: uppercase; letter-spacing: .18em;
  color: var(--text-muted);
}
.fetch-bar input.field {
  border: 1px solid var(--border-strong);
  background: var(--input-bg);
  color: var(--text);
  padding: 8px 12px;
  font-family: 'IBM Plex Mono';
  font-size: 13px;
  border-radius: 6px;
  transition: border-color .15s ease, box-shadow .15s ease;
}
.fetch-bar input.field:focus {
  outline: none; border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
.fetch-bar input.field.ticker {
  width: 110px;
  text-transform: uppercase;
  font-weight: 600;
  font-size: 14px;
  letter-spacing: .05em;
}
.fetch-bar input.field.apikey { width: 220px; }
.fetch-bar a.help {
  font-size: 11px;
  color: var(--text-muted);
  text-decoration: none;
  border-bottom: 1px dotted var(--text-muted);
  letter-spacing: .03em;
}
.fetch-bar a.help:hover { color: var(--accent); border-bottom-color: var(--accent); }
.fetch-status {
  font-size: 12.5px;
  color: var(--text-muted);
  font-style: italic;
  min-width: 220px;
  font-family: 'IBM Plex Mono';
}
.fetch-status.error { color: var(--fail); font-style: normal; }
.fetch-status.success { color: var(--pass); font-style: normal; font-weight: 500; }
.fetch-status.loading {
  color: var(--text);
  position: relative;
  padding-left: 22px;
  font-style: normal;
}
.fetch-status.loading::before {
  content: ""; position: absolute; left: 0; top: 50%; margin-top: -7px;
  width: 14px; height: 14px;
  border: 2px solid var(--border-strong);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.fetch-bar .spacer { flex: 1; min-width: 8px; }
.fetch-bar .meta {
  font-size: 11px; color: var(--text-faint);
  letter-spacing: .04em;
}
.fetch-bar .meta strong { color: var(--text-muted); font-weight: 500; }

td.verdict-cell { padding: 8px 12px; text-align: center; }
td.verdict-cell .pill { font-size: 9.5px; padding: 3px 9px; }
td.row-meta {
  font-size: 10px;
  color: var(--text-faint);
  letter-spacing: .12em;
  text-transform: uppercase;
  padding: 0 8px;
}
td.row-meta.fetched { color: var(--accent); }

.ticker-with-refresh { display: inline-flex; align-items: center; gap: 6px; }
.refresh-btn {
  width: 20px; height: 20px;
  border: 1px solid transparent;
  background: transparent;
  color: var(--text-faint);
  cursor: pointer;
  opacity: 0;
  display: grid; place-items: center;
  border-radius: 4px;
  transition: opacity .15s ease, color .15s ease, background .15s ease, border-color .15s ease;
  padding: 0;
}
tr:hover .refresh-btn { opacity: .55; }
.refresh-btn:hover { opacity: 1; color: var(--accent); background: var(--accent-soft); border-color: var(--accent); }
.refresh-btn svg { width: 12px; height: 12px; }
.refresh-btn.spinning { opacity: 1; color: var(--accent); pointer-events: none; }
.refresh-btn.spinning svg { animation: spin .9s linear infinite; }
.refresh-btn.error { opacity: 1; color: var(--fail); border-color: var(--fail); background: var(--fail-soft); }

/* Toast for fetches initiated from non-Inputs tabs */
.fetch-toast {
  position: fixed; right: 24px; bottom: 24px; z-index: 100;
  background: var(--surface); color: var(--text);
  border: 1px solid var(--border-strong); border-radius: 8px;
  padding: 10px 14px; font-family: 'IBM Plex Mono'; font-size: 12.5px;
  box-shadow: 0 6px 18px rgba(0,0,0,.18);

.fetch-toast.show { opacity: 1; transform: none; }
.fetch-toast.success { border-color: var(--pass); color: var(--pass); }
.fetch-toast.error { border-color: var(--fail); color: var(--fail); }

}

  border-radius: 6px;
  display: inline-grid; place-items: center;
  opacity: .55;
  transition: opacity .15s ease, color .15s ease, background .15s ease, border-color .15s ease;
}
tbody tr:hover button.row-remove { opacity: 1; }
button.row-remove:hover {
  color: var(--fail);
  background: var(--fail-soft);
  border-color: var(--fail);
}

@media (max-width: 900px) {

}

// Build PROFILES lookup: { Standard: { key: value, ... }, ... }
const PROFILES = {};
PROFILE_NAMES.forEach((p, idx) => {

  CRITERIA.forEach(sec => sec.items.forEach(it => {

// Flat criterion lookup
const CRIT_BY_KEY = {};
CRITERIA.forEach(sec => sec.items.forEach(it => { CRIT_BY_KEY[it.key] = it; }));

// Investment schools — each defines its own 5-stage funnel.
// Common stages: universe, redflags, scenario. Variable: quality / valuation / momentum.
const SCHOOLS = {
  'Quality + Value':    { stages: ['universe', 'quality',   'valuation', 'redflags', 'scenario'] },
  'Quality + Momentum': { stages: ['universe', 'quality',   'momentum',  'redflags', 'scenario'] },
  'Value + Momentum':   { stages: ['universe', 'valuation', 'momentum',  'redflags', 'scenario'] },
};
const SCHOOL_NAMES = Object.keys(SCHOOLS);

function schoolStages() { return SCHOOLS[state.school].stages; }
function schoolUses(stage) { return schoolStages().includes(stage); }

// Plain-English definitions, keyed by input/metric key. Used in cell + header tooltips.
const METRIC_DEFINITIONS = {

  name: 'Company name.',
  sector: 'GICS sector classification.',

  if (CRITERION_EXTRA_DEFS[key]) return CRITERION_EXTRA_DEFS[key];

  if (key === 'rdcf_max') return METRIC_DEFINITIONS.rdcf_ratio;

function avNum(v) {
  if (v === null || v === undefined || v === 'None' || v === '-' || v === '') return null;
  const n = Number(v);
  return Number.isFinite(n) ? n : null;
}
function mean(a) {
  const f = a.filter(x => x !== null && Number.isFinite(x));
  return f.length ? f.reduce((s,x)=>s+x,0)/f.length : null;
}
function median(a) {
  const f = a.filter(x => x !== null && Number.isFinite(x)).sort((x,y)=>x-y);
  if (!f.length) return null;
  const m = Math.floor(f.length/2);
  return f.length % 2 ? f[m] : (f[m-1] + f[m]) / 2;
}
function stdevPop(a) {
  const f = a.filter(x => x !== null && Number.isFinite(x));
  if (f.length < 2) return null;
  const m = f.reduce((s,x)=>s+x,0)/f.length;
  return Math.sqrt(f.reduce((s,x)=>s+(x-m)*(x-m),0)/f.length);
}

const AV_MIN_GAP_MS = 1500;  // serial calls, ≤1 request/sec
let _avLastCallAt = 0;

function _avSleep(ms) { return new Promise(res => setTimeout(res, ms)); }

async function _avCall(fn, symbol, key) {
  // Enforce minimum gap between any two AV requests
  const since = Date.now() - _avLastCallAt;
  if (since < AV_MIN_GAP_MS) await _avSleep(AV_MIN_GAP_MS - since);
  _avLastCallAt = Date.now();
  const url = `https://www.alphavantage.co/query?function=${fn}&symbol=${encodeURIComponent(symbol)}&apikey=${encodeURIComponent(key)}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status} on ${fn}`);
  const j = await r.json();
  if (j.Note) throw new Error('AV rate limit hit on ' + fn + '. Free tier is 25 calls/day, 5/minute. Try again later.');
  if (j.Information) throw new Error('AV: ' + String(j.Information).slice(0, 240));
  if (j['Error Message']) throw new Error('AV: ' + String(j['Error Message']).slice(0, 240));
  return j;
}

async function _avDaily(symbol, key) {
  const since = Date.now() - _avLastCallAt;
  if (since < AV_MIN_GAP_MS) await _avSleep(AV_MIN_GAP_MS - since);
  _avLastCallAt = Date.now();
  const url = `https://www.alphavantage.co/query?function=TIME_SERIES_DAILY&symbol=${encodeURIComponent(symbol)}&outputsize=full&apikey=${encodeURIComponent(key)}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status} on TIME_SERIES_DAILY`);
  const j = await r.json();
  if (j.Note) throw new Error('AV rate limit on TIME_SERIES_DAILY. ' + String(j.Note).slice(0, 200));
  if (j.Information) throw new Error('AV: ' + String(j.Information).slice(0, 240));
  if (j['Error Message']) throw new Error('AV: ' + String(j['Error Message']).slice(0, 240));
  return j;
}

async function fetchAlphaVantage(symbol, key, onProgress, opts) {
  const fns = ['OVERVIEW', 'INCOME_STATEMENT', 'BALANCE_SHEET', 'CASH_FLOW', 'GLOBAL_QUOTE'];
  const includeMomentum = !!(opts && opts.includeMomentum);
  const total = fns.length + (includeMomentum ? 1 : 0);
  const out = [];
  for (let i = 0; i < fns.length; i++) {
    if (onProgress) onProgress(fns[i], i + 1, total);
    out.push(await _avCall(fns[i], symbol, key));
  }
  let daily = null;
  if (includeMomentum) {
    if (onProgress) onProgress('TIME_SERIES_DAILY', total, total);
    daily = await _avDaily(symbol, key);
  }
  return { ov: out[0], is: out[1], bs: out[2], cf: out[3], q: out[4], daily };
}

// Parse TIME_SERIES_DAILY response into ordered price series (newest first) and compute momentum
function computeMomentum(daily) {
  if (!daily || !daily['Time Series (Daily)']) return null;
  const series = daily['Time Series (Daily)'];
  const dates = Object.keys(series).sort().reverse();  // newest first
  if (dates.length < 252) return null;
  const closes = dates.map(d => avNum(series[d]['4. close']));
  const highs = dates.map(d => avNum(series[d]['2. high']) ?? avNum(series[d]['4. close']));

  const today = closes[0];
  const c1m   = closes[21];   // ~21 trading days
  const c6m   = closes[126];
  const c12m  = closes[252];

  const mom12_1 = (c1m && c12m) ? ((c1m / c12m) - 1) * 100 : null;
  const mom6m   = (today && c6m) ? ((today / c6m) - 1) * 100 : null;

  const window52w = highs.slice(0, 252).filter(v => v !== null && v > 0);
  const high52w = window52w.length ? Math.max(...window52w) : null;
  const dist_52wh = (today && high52w) ? ((today / high52w) - 1) * 100 : null;

  const ma200window = closes.slice(0, 200).filter(v => v !== null && v > 0);
  const ma200 = ma200window.length === 200 ? ma200window.reduce((s,x)=>s+x, 0) / 200 : null;
  const above_200dma = (today && ma200) ? (today > ma200 ? 1 : 0) : null;

  return { mom12_1, mom6m, dist_52wh, above_200dma };
}

function parseAV(symbol, data) {
  const { ov, is, bs, cf, q } = data;
  if (!ov || !ov.Symbol) throw new Error('No fundamentals returned for ' + symbol);

  const isRpt = (is.annualReports || []).slice(0, 5);  // most recent first
  const bsRpt = (bs.annualReports || []).slice(0, 5);
  const cfRpt = (cf.annualReports || []).slice(0, 5);
  const quote = q['Global Quote'] || {};

  const sector = (ov.Sector || '').trim();
  const sectorKey = sector.toUpperCase();
  const mktcapRaw = avNum(ov.MarketCapitalization);    // absolute dollars
  const ebitda = avNum(ov.EBITDA);
  const epsTTM = avNum(ov.DilutedEPSTTM) ?? avNum(ov.EPS);
  const peg = avNum(ov.PEGRatio);

  // Income statement series (index 0 = latest)
  const rev    = isRpt.map(r => avNum(r.totalRevenue));
  const gp     = isRpt.map(r => avNum(r.grossProfit));
  const opInc  = isRpt.map(r => avNum(r.operatingIncome) ?? avNum(r.ebit));
  const ni     = isRpt.map(r => avNum(r.netIncome));
  const intExp = isRpt.map(r => avNum(r.interestExpense));
  const incTax = isRpt.map(r => avNum(r.incomeTaxExpense));
  const incPre = isRpt.map(r => avNum(r.incomeBeforeTax));

  // Balance sheet series
  const ta = bsRpt.map(r => avNum(r.totalAssets));
  const ca = bsRpt.map(r => avNum(r.totalCurrentAssets));
  const cl = bsRpt.map(r => avNum(r.totalCurrentLiabilities));
  const cash = bsRpt.map(r => avNum(r.cashAndShortTermInvestments) ?? avNum(r.cashAndCashEquivalentsAtCarryingValue) ?? 0);
  const stDebt = bsRpt.map(r => avNum(r.currentDebt) ?? avNum(r.shortTermDebt) ?? 0);
  const ltDebt = bsRpt.map(r => avNum(r.longTermDebt) ?? avNum(r.longTermDebtNoncurrent) ?? 0);
  const totalDebt = bsRpt.map((_, i) => (stDebt[i] || 0) + (ltDebt[i] || 0));
  const tl = bsRpt.map(r => avNum(r.totalLiabilities));
  const eq = bsRpt.map(r => avNum(r.totalShareholderEquity));
  const re = bsRpt.map(r => avNum(r.retainedEarnings));
  const gw = bsRpt.map(r => avNum(r.goodwill) ?? 0);
  const sh = bsRpt.map(r => avNum(r.commonStockSharesOutstanding));

  // Cash flow series
  const ocf = cfRpt.map(r => avNum(r.operatingCashflow));
  const capex = cfRpt.map(r => {
    const v = avNum(r.capitalExpenditures);
    return v === null ? null : Math.abs(v);
  });
  const fcf = ocf.map((o, i) => (o !== null && capex[i] !== null) ? o - capex[i] : null);

  // Quote
  const price = avNum(quote['05. price']);
  const volume = avNum(quote['06. volume']);
  const adv = (price !== null && volume !== null) ? (price * volume) / 1e6 : null;  // $M, single-day proxy

  // ROIC per year: NOPAT / Invested Capital
  const taxRates = incPre.map((p, i) => {
    if (p === null || incTax[i] === null || p === 0) return 0.25;
    return Math.min(0.4, Math.max(0, incTax[i] / p));
  });
  const nopat = opInc.map((o, i) => o !== null ? o * (1 - taxRates[i]) : null);
  const ic = bsRpt.map((_, i) => (eq[i] !== null) ? eq[i] + (totalDebt[i] || 0) - (cash[i] || 0) : null);
  const roicSeries = nopat.map((n, i) => (n !== null && ic[i] !== null && ic[i] > 0) ? (n / ic[i]) * 100 : null);
  const roicVals = roicSeries.filter(v => v !== null);
  const roic5y = median(roicVals);
  const roic_yrs = roicVals.filter(r => r > 10).length;  // 10% as WACC + 3% proxy

  // Gross margin CV (decimal)
  const gms = gp.map((g, i) => (g !== null && rev[i]) ? g / rev[i] : null);
  const gmsFiltered = gms.filter(v => v !== null);
  const gmMean = mean(gmsFiltered);
  const gm_cv = (gmsFiltered.length >= 2 && gmMean) ? stdevPop(gmsFiltered) / Math.abs(gmMean) : null;

  // FCF margin (avg %)
  const fcfMargins = fcf.map((f, i) => (f !== null && rev[i]) ? (f / rev[i]) * 100 : null);
  const fcf_margin = mean(fcfMargins.filter(v => v !== null));

  // Cash conversion: sum(FCF) / sum(NI) over available years
  const fcfSum = fcf.filter(v => v !== null).reduce((s,v)=>s+v, 0);
  const niSum  = ni.filter(v => v !== null).reduce((s,v)=>s+v, 0);
  const cashconv = niSum ? fcfSum / niSum : null;

  // OCF/NI latest
  const ocfni = (ocf[0] !== null && ni[0]) ? ocf[0] / ni[0] : null;

  // Balance sheet ratios (latest)
  const ndebt = (ebitda && totalDebt[0]) ? (totalDebt[0] - (cash[0] || 0)) / ebitda : null;
  const intcov = (opInc[0] !== null && intExp[0]) ? opInc[0] / intExp[0] : null;
  const currratio = (ca[0] !== null && cl[0]) ? ca[0] / cl[0] : null;
  const goodwill_pct = (gw[0] !== null && ta[0]) ? (gw[0] / ta[0]) * 100 : null;

  // Altman Z (manufacturing/non-finance version)
  let altman = null;
  if (ta[0] && tl[0] && mktcapRaw && ca[0] !== null && cl[0] !== null && re[0] !== null && opInc[0] !== null && rev[0] !== null) {
    altman = 1.2 * ((ca[0] - cl[0]) / ta[0])
           + 1.4 * (re[0] / ta[0])
           + 3.3 * (opInc[0] / ta[0])
           + 0.6 * (mktcapRaw / tl[0])
           + 1.0 * (rev[0] / ta[0]);
  }

  // Revenue CAGR (oldest to newest)
  const revPos = rev.filter(v => v !== null && v > 0);
  const rev_cagr = revPos.length >= 2
    ? (Math.pow(revPos[0] / revPos[revPos.length - 1], 1 / (revPos.length - 1)) - 1) * 100
    : null;

  // Share count CAGR
  const shPos = sh.filter(v => v !== null && v > 0);
  const sharecagr = shPos.length >= 2
    ? (Math.pow(shPos[0] / shPos[shPos.length - 1], 1 / (shPos.length - 1)) - 1) * 100
    : null;

  // EV/EBIT
  const ev = mktcapRaw !== null ? mktcapRaw + (totalDebt[0] || 0) - (cash[0] || 0) : null;
  const evebit = (ev && opInc[0]) ? ev / opInc[0] : null;
  const fcfy = (ev && fcf[0] !== null) ? (fcf[0] / ev) * 100 : null;

  // Incremental ROIC: ΔNOPAT / ΔIC across 5y
  let incroic = null;
  if (nopat[0] !== null && nopat[nopat.length - 1] !== null && ic[0] !== null && ic[ic.length - 1] !== null) {
    const dN = nopat[0] - nopat[nopat.length - 1];
    const dI = ic[0] - ic[ic.length - 1];
    if (Math.abs(dI) > 1) incroic = (dN / dI) * 100;
  }

  const sd = SECTOR_DEFAULTS[sectorKey] || SECTOR_DEFAULTS._DEFAULT;

  // IV via sector-typical PE × TTM EPS (simple anchor; user can refine)
  const iv = (epsTTM !== null && epsTTM > 0) ? epsTTM * sd.target_pe : null;

  const mom = computeMomentum(data.daily);

  return {
    ticker: symbol.toUpperCase(),
    name: ov.Name || symbol,
    sector,
    mktcap: mktcapRaw !== null ? mktcapRaw / 1e6 : null,  // store as $M
    adv,
    mom12_1: mom ? mom.mom12_1 : null,
    mom6m:   mom ? mom.mom6m   : null,
    dist_52wh: mom ? mom.dist_52wh : null,
    above_200dma: mom ? mom.above_200dma : null,
    rs_index: GENERIC_DEFAULTS.rs_index,
    eps_rev:  GENERIC_DEFAULTS.eps_rev,
    roic5y, roic_yrs,
    gm_cv,
    fcf_margin, cashconv,
    ndebt, intcov, currratio, altman,
    beneish: GENERIC_DEFAULTS.beneish,
    incroic, sharecagr,
    acq_fcf: GENERIC_DEFAULTS.acq_fcf,
    rev_cagr,
    topcust: GENERIC_DEFAULTS.topcust,
    evebit,
    evebit_pct: GENERIC_DEFAULTS.evebit_pct,
    fcfy, peg,
    rdcf_ratio: GENERIC_DEFAULTS.rdcf_ratio,
    acqmul_pct: GENERIC_DEFAULTS.acqmul_pct,
    iv, price,
    accruals: GENERIC_DEFAULTS.accruals,
    dso: GENERIC_DEFAULTS.dso,
    ocfni,
    goodwill: goodwill_pct,
    insider: GENERIC_DEFAULTS.insider,
    short: GENERIC_DEFAULTS.short,
    auditor_chg: GENERIC_DEFAULTS.auditor_chg,
    restate: GENERIC_DEFAULTS.restate,
    bull_irr: sd.bull_irr, bull_p: sd.bull_p,
    base_irr: sd.base_irr, base_p: sd.base_p,
    bear_irr: sd.bear_irr, bear_p: sd.bear_p,
    moat: sd.moat,
    mgmt_own: GENERIC_DEFAULTS.mgmt_own,
    turnover: GENERIC_DEFAULTS.turnover,
    _fetched: Date.now(),
  };
}

const CACHE_PREFIX = 'qvs.cache.';
const CACHE_TTL_MS = 90 * 24 * 60 * 60 * 1000;  // 90 days

async function handleFetch(symbol, key, onProgress, opts) {
  const sym = symbol.trim().toUpperCase();
  if (!sym) throw new Error('Enter a ticker.');
  if (!key) throw new Error('Set your Alpha Vantage API key first.');
  const includeMomentum = !!(opts && opts.includeMomentum);
  const cacheKey = CACHE_PREFIX + sym;
  let raw;
  try {
    const cached = localStorage.getItem(cacheKey);
    if (cached) {
      const parsed = JSON.parse(cached);
      const fresh = Date.now() - parsed.fetchedAt < CACHE_TTL_MS;
      const hasMomentum = !!(parsed.data && parsed.data.daily);
      if (fresh && (!includeMomentum || hasMomentum)) raw = parsed.data;
    }
  } catch (e) {}
  let fromCache = !!raw;
  if (!raw) {
    raw = await fetchAlphaVantage(sym, key, onProgress, { includeMomentum });
    try {
      localStorage.setItem(cacheKey, JSON.stringify({ fetchedAt: Date.now(), data: raw }));
    } catch (e) {}
  }
  const ticker = parseAV(sym, raw);
  return { ticker, fromCache };
}

// =============================================================================
// LOOKUPS / FORMATTING
// =============================================================================

function activeThreshold(key) {
  const o = state.overrides[key];
  if (o !== undefined && o !== '' && o !== null && !Number.isNaN(Number(o))) {
    return Number(o);
  }
  return PROFILES[state.profile][key];
}

function fmt(value, type) {
  if (value === null || value === undefined || value === '' || Number.isNaN(value)) return '—';
  const n = Number(value);
  if (type === 'pct')   return n.toFixed(1).replace(/\.0$/, '.0') + '%';
  if (type === 'pct0')  return Math.round(n) + '%';
  if (type === 'n0')    return n.toLocaleString(undefined, { maximumFractionDigits: 0 });
  if (type === 'n1')    return n.toFixed(1);
  if (type === 'n2')    return n.toFixed(2);
  if (type === 'mone') {
    if (Math.abs(n) >= 1000) return n.toLocaleString(undefined, { maximumFractionDigits: 0 });
    return n.toFixed(2);
  }
  return String(value);
}

function fmtByKey(key, val) {
  const it = CRIT_BY_KEY[key];
  return fmt(val, it ? it.fmt : 'n2');
}

function parseNumber(v) {
  if (v === null || v === undefined || v === '') return null;
  if (typeof v === 'number') return v;
  const cleaned = String(v).replace(/,/g,'').replace(/%/g,'').trim();
  if (cleaned === '' || cleaned === '-') return null;
  const n = Number(cleaned);
  return Number.isNaN(n) ? null : n;
}

// =============================================================================
// COMPUTATIONS
// =============================================================================

// Returns true / false / null (null if insufficient input)
function gatePass(value, threshold, comp) {
  const v = parseNumber(value);
  const t = parseNumber(threshold);
  if (v === null || t === null) return null;
  return comp === 'min' ? v >= t : v <= t;
}

function ynPass(val) {
  if (!val) return null;
  const v = String(val).trim().toUpperCase();
  if (v === 'N') return true;
  if (v === 'Y') return false;
  return null;
}

function evalUniverse(t) {
  return UNIVERSE_GATES.map(g => ({
    ...g,
    pass: gatePass(t[g.metric], activeThreshold(g.thr), CRIT_BY_KEY[g.thr].comp),
    value: parseNumber(t[g.metric]),
    threshold: activeThreshold(g.thr),
  }));
}
function evalQuality(t) {
  return QUALITY_GATES.map(g => ({
    ...g,
    pass: gatePass(t[g.metric], activeThreshold(g.thr), CRIT_BY_KEY[g.thr].comp),
    value: parseNumber(t[g.metric]),
    threshold: activeThreshold(g.thr),
  }));
}
function evalValuation(t) {
  return VALUATION_GATES.map(g => ({
    ...g,
    pass: gatePass(t[g.metric], activeThreshold(g.thr), CRIT_BY_KEY[g.thr].comp),
    value: parseNumber(t[g.metric]),
    threshold: activeThreshold(g.thr),
  }));
}
function evalRedFlags(t) {
  const num = REDFLAG_GATES.map(g => ({
    ...g,
    pass: gatePass(t[g.metric], activeThreshold(g.thr), CRIT_BY_KEY[g.thr].comp),
    value: parseNumber(t[g.metric]),
    threshold: activeThreshold(g.thr),
  }));
  const yn = REDFLAG_YN_GATES.map(g => ({
    ...g,
    pass: ynPass(t[g.metric]),
    value: t[g.metric],
    threshold: 'N',
  }));
  return [...num, ...yn];
}

function MoS(t) {
  const iv = parseNumber(t.iv), px = parseNumber(t.price);
  if (iv === null || px === null || iv === 0) return null;
  return ((iv - px) / iv) * 100;  // percent
}

function expectedIRR(t) {
  const bi = parseNumber(t.bull_irr), bp = parseNumber(t.bull_p);
  const xi = parseNumber(t.base_irr), xp = parseNumber(t.base_p);
  const ri = parseNumber(t.bear_irr), rp = parseNumber(t.bear_p);
  if ([bi, bp, xi, xp, ri, rp].some(v => v === null)) return null;
  const sumP = bp + xp + rp;
  if (Math.abs(sumP - 100) > 1) return 'P≠100%';
  return (bi*bp + xi*xp + ri*rp) / 100;
}

function winStats(t) {
  // p (win probability) = sum of probs where IRR > 0
  // b (win/loss ratio) = expected positive return / |expected negative return|
  const rows = [
    [parseNumber(t.bull_irr), parseNumber(t.bull_p)],
    [parseNumber(t.base_irr), parseNumber(t.base_p)],
    [parseNumber(t.bear_irr), parseNumber(t.bear_p)],
  ];
  if (rows.some(r => r[0] === null || r[1] === null)) return null;
  let p = 0, gain = 0, loss = 0;
  rows.forEach(([irr, prob]) => {
    const w = prob / 100;
    if (irr > 0) { p += w; gain += irr * w; }
    else if (irr < 0) { loss += -irr * w; }
  });
  const b = loss === 0 ? 3 : gain / loss;  // fallback when no loss scenario
  return { p, b };
}

function kellyFraction(t) {
  const ws = winStats(t);
  if (!ws) return null;
  const { p, b } = ws;
  if (b <= 0) return 0;
  return Math.max(0, (p * b - (1 - p)) / b);
}

function passCount(arr) { return arr.filter(g => g.pass === true).length; }
function totalEvaluable(arr) { return arr.filter(g => g.pass !== null).length; }

function stageResult(arr) {
  const ev = totalEvaluable(arr);
  if (ev === 0) return null;
  const passes = passCount(arr);
  // Pass iff every gate we could evaluate cleared. Null gates are skipped (insufficient data).
  return passes === ev ? 'PASS' : 'FAIL';
}

function valuationResult(t) {
  const arr = evalValuation(t);
  const ev = totalEvaluable(arr);
  if (ev === 0) return { result: null, passes: 0, mos: MoS(t), mosOk: null };
  const passes = passCount(arr);
  const minPass = activeThreshold('val_passes_min');
  const mos = MoS(t);
  const mosMin = activeThreshold('mos_min');
  const mosOk = mos === null ? null : mos >= mosMin;
  const result = (passes >= minPass && mosOk === true) ? 'PASS' : 'FAIL';
  return { result, passes, mos, mosOk };
}

function evalMomentum(t) {
  return MOMENTUM_GATES.map(g => ({
    ...g,
    pass: gatePass(t[g.metric], activeThreshold(g.thr), CRIT_BY_KEY[g.thr].comp),
    value: parseNumber(t[g.metric]),
    threshold: activeThreshold(g.thr),
  }));
}

function momentumResult(t) {
  const arr = evalMomentum(t);
  const ev = totalEvaluable(arr);
  if (ev === 0) return { result: null, passes: 0 };
  const passes = passCount(arr);
  const minPass = activeThreshold('mom_passes_min');
  const result = passes >= minPass ? 'PASS' : 'FAIL';
  return { result, passes };
}

function summarize(t) {
  const uni = evalUniverse(t);
  const qua = evalQuality(t);
  const val = valuationResult(t);
  const mom = momentumResult(t);
  const rf = evalRedFlags(t);
  const eirr = expectedIRR(t);
  const uniRes = stageResult(uni);
  const quaRes = stageResult(qua);
  const valRes = val.result;
  const momRes = mom.result;
  const rfRes = stageResult(rf);
  let irrRes = null;
  if (eirr !== null && eirr !== 'P≠100%') {
    irrRes = eirr >= activeThreshold('eirr_min') ? 'PASS' : 'FAIL';
  } else if (eirr === 'P≠100%') {
    irrRes = 'FAIL';
  }
  const stageMap = { universe: uniRes, quality: quaRes, valuation: valRes, momentum: momRes, redflags: rfRes, scenario: irrRes };
  const active = schoolStages();
  const activeResults = active.map(s => stageMap[s]);
  const stagesPassed = activeResults.filter(s => s === 'PASS').length;
  const stagesEval = activeResults.filter(s => s !== null).length;
  let overall = null;
  if (stagesEval === active.length) {
    overall = stagesPassed === active.length ? 'BUY' : stagesPassed >= active.length - 1 ? 'WATCH' : 'REJECT';
  }
  return { uni, qua, val, mom, rf, eirr, irrRes, uniRes, quaRes, valRes, momRes, rfRes, stagesPassed, stagesEval, overall, activeStages: active, stageResults: stageMap };
}

// Toast helper — used when refetch is triggered from a non-Inputs tab
let _toastEl = null;
let _toastTimer = null;
function showToast(text, kind /* 'loading'|'success'|'error' */) {
  if (!_toastEl) {
    _toastEl = document.createElement('div');
    _toastEl.className = 'fetch-toast';
    document.body.appendChild(_toastEl);
  }
  _toastEl.className = 'fetch-toast show' + (kind ? ' ' + kind : '');

// Refetch a ticker from anywhere in the app
async function refetchTickerSymbol(symbol, btn) {
  const sym = String(symbol || '').trim().toUpperCase();
  if (!sym) return;
  if (!state.avKey) {
    if (btn) { btn.classList.add('error'); btn.title = 'Set your Alpha Vantage key on the Inputs tab.'; setTimeout(() => btn.classList.remove('error'), 4000); }
    showToast('Add your Alpha Vantage key on the Inputs tab.', 'error');
    return;
  }
  if (btn) { btn.classList.remove('error'); btn.classList.add('spinning'); }
  showToast(`Refetching ${sym}…`, 'loading');
  // Clear cache so we go to network
  try { localStorage.removeItem(CACHE_PREFIX + sym); } catch (_) {}
  try {
    const onProgress = (fn, n, total) => showToast(`Refetching ${sym} · ${fn} (${n}/${total})…`, 'loading');
    const { ticker } = await handleFetch(sym, state.avKey, onProgress, { includeMomentum: schoolUses('momentum') });
    const idx = state.tickers.findIndex(t => (t.ticker || '').toUpperCase() === sym);
    if (idx >= 0) state.tickers[idx] = ticker; else state.tickers.unshift(ticker);
    saveState();
    const s = summarize(ticker);
    showToast(`✓ ${sym} · ${ticker.sector || 'Unknown'} · ${s.overall || '—'}`, 'success');
    renderActive();
  } catch (err) {
    if (btn) { btn.classList.remove('spinning'); btn.classList.add('error'); btn.title = err.message; setTimeout(() => btn.classList.remove('error'), 5000); }
    showToast('✕ ' + (err.message || 'Fetch failed'), 'error');
  }
}

  refetchTickerSymbol(btn.dataset.refetch, btn);
});

// Reverse lookup: metric key -> threshold criterion key (so input cells can show their target)
const METRIC_TO_THR = (() => {
  const m = {};
  CRITERIA.forEach(sec => sec.items.forEach(it => {
    const base = it.key.replace(/_(min|max)$/, '');
    if (METRIC_DEFINITIONS[base] && !m[base]) m[base] = it.key;
  }));
  m.rdcf_ratio = 'rdcf_max';
  return m;
})();

function inputCellTooltip(metricKey) {
  const def = METRIC_DEFINITIONS[metricKey] || '';
  const thrKey = METRIC_TO_THR[metricKey];
  if (!thrKey) return def;
  const crit = CRIT_BY_KEY[thrKey];
  if (!crit) return def;
  const op = crit.comp === 'min' ? '≥' : '≤';
  const val = activeThreshold(thrKey);
  return `${def}\n\nThreshold (${state.profile}): ${op} ${fmt(val, crit.fmt)}`.trim();
}

function gateTooltip(gateEval) {
  const def = METRIC_DEFINITIONS[gateEval.metric] || '';
  const isYN = gateEval.thr === undefined;
  let actual, required;
  if (isYN) {
    actual = gateEval.value ? String(gateEval.value).toUpperCase() : 'n/a';
    required = 'N (no flag)';
  } else {
    const crit = CRIT_BY_KEY[gateEval.thr];
    const cfmt = crit ? crit.fmt : 'n2';
    actual = (gateEval.value === null || gateEval.value === undefined) ? 'n/a' : fmt(gateEval.value, cfmt);
    const op = crit && crit.comp === 'min' ? '≥' : '≤';
    required = `${op} ${fmt(gateEval.threshold, cfmt)}`;
  }
  return `${def}\n\nActual: ${actual}\nRequired: ${required}`.trim();
}

function gateCell(gateEval) {
  // Back-compat: if a bare bool/null was passed, render without tooltip
  if (gateEval === null || gateEval === undefined || typeof gateEval === 'boolean') {
    const pass = gateEval;
    if (pass === null || pass === undefined) return `<td class="gate empty">·</td>`;
    return pass ? `<td class="gate pass">✓</td>` : `<td class="gate fail">✕</td>`;
  }
  const tip = safeText(gateTooltip(gateEval));
  if (gateEval.pass === null || gateEval.pass === undefined) {
    return `<td class="gate empty" title="${tip}">·</td>`;
  }
  return gateEval.pass
    ? `<td class="gate pass" title="${tip}">✓</td>`
    : `<td class="gate fail" title="${tip}">✕</td>`;
}

function pillFor(status) {
  if (status === 'PASS') return `<span class="pill pass">Pass</span>`;
  if (status === 'FAIL') return `<span class="pill fail">Fail</span>`;
  if (status === 'BUY')   return `<span class="pill buy">Buy</span>`;
  if (status === 'WATCH') return `<span class="pill watch">Watch</span>`;
  if (status === 'REJECT')return `<span class="pill reject">Reject</span>`;
  return `<span class="pill empty">—</span>`;
}

function safeText(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

          <div class="label" title="${rowTip}">${safeText(it.label)}</div>
          <div class="num active">${fmt(active, it.fmt)}</div>
          <div class="override-cell">
            <input type="text" class="cell override-input" data-override="${it.key}"
                   value="${safeText(ovStr)}" placeholder="—"/>
          </div>
          <div class="num default">${fmt(def, it.fmt)}</div>
          ${profCells}
          <div class="note">${safeText(it.note || '')}</div>
        </div>`;
    }).join('');
    return html;
  }).join('');

  root.innerHTML = `
    <div class="panel-header">
      <div>
        <div class="stage">Control Panel</div>
        <h2><em>Active</em> profile & thresholds</h2>
        <p>Switch profiles via the header pill. Override any threshold in the highlighted column to customize without editing the profile defaults.</p>
      </div>
      <div class="panel-actions">
        <button class="btn subtle" id="clearOverrides">Clear overrides</button>
        <button class="btn" id="resetAll">Reset all</button>
      </div>
    </div>
    <div class="card">
      <div class="setup-header-row">${headerCols}</div>
      ${rows}
    </div>`;

  // Wire override inputs
  root.querySelectorAll('input[data-override]').forEach(inp => {
    inp.addEventListener('input', e => {
      const k = e.target.dataset.override;
      const v = e.target.value.trim();
      if (v === '') {
        delete state.overrides[k];
      } else if (!Number.isNaN(Number(v.replace(/,/g,'').replace(/%/g,'')))) {
        state.overrides[k] = Number(v.replace(/,/g,'').replace(/%/g,''));
      } else {
        state.overrides[k] = v;
      }
      saveState();
      // Update only the Active cell on the same row (don't rerender entire panel — keeps focus)
      const row = e.target.closest('.setup-row');
      const it = CRIT_BY_KEY[k];
      const def = PROFILES[state.profile][k];
      const ov = state.overrides[k];
      const active = (ov !== undefined && ov !== '' && ov !== null && !Number.isNaN(Number(ov))) ? Number(ov) : def;
      row.querySelector('.num.active').textContent = fmt(active, it.fmt);
    });
  });
  $('#clearOverrides').addEventListener('click', () => {
    state.overrides = {};
    saveState(); renderSetup();
  });
  $('#resetAll').addEventListener('click', () => {
    if (!confirm('Reset profile, overrides, and all ticker data?')) return;
    state = defaultState();
    saveState();
    initProfileSelect();
    render();
  });
}

function renderInputs() {

      const def = METRIC_DEFINITIONS[f.key] || '';
      return `<th class="${f.type === 'text' ? 'left' : 'numeric'}" title="${safeText(def)}">${safeText(f.label)}</th>`;
    }).join('')).join('');

  const rows = state.tickers.map((t, idx) => {
    const cells = INPUT_GROUPS.map(g => g.items.map(f => {
      const v = t[f.key];
      const vStr = (v === null || v === undefined) ? '' : v;
      const tip = safeText(inputCellTooltip(f.key));
      if (f.type === 'text') {
        return `<td title="${tip}"><input type="text" class="cell text" data-row="${idx}" data-key="${f.key}" value="${safeText(vStr)}" title="${tip}"/></td>`;

          <option value="Wide"${vStr==='Wide'?' selected':''}>Wide</option>

    return `<tr data-row="${idx}">

      ${cells}

      <td class="row-actions">

      <div class="stat"><div class="k">Reject</div><div class="v mono fail" id="statReject">${rejects}</div></div>
      <div class="stat"><div class="k">Profile</div><div class="v"><em>${state.profile}</em></div></div>

    <div class="card">

function wireInputsEvents(root) {
  // Cell edits
  root.querySelectorAll('input.cell, select.cell').forEach(inp => {
    inp.addEventListener('input', e => {
      const row = Number(e.target.dataset.row);
      const key = e.target.dataset.key;
      const val = e.target.value;
      const f = INPUT_GROUPS.flatMap(g => g.items).find(it => it.key === key);
      if (f && f.type !== 'text' && f.type !== 'yn' && f.type !== 'moat') {
        state.tickers[row][key] = parseNumber(val);
      } else {
        state.tickers[row][key] = val === '' ? null : val;
      }
      saveState();
      refreshVerdict(row);
      refreshInputsStats();
    });
  });

  // Remove row (and its AV cache so a re-fetch is fresh)
  root.querySelectorAll('button[data-action="remove"]').forEach(b => {
    b.addEventListener('click', e => {
      const idx = Number(e.currentTarget.dataset.row);
      const removed = state.tickers[idx];
      const sym = (removed?.ticker || '').toUpperCase();
      state.tickers.splice(idx, 1);
      if (sym) { try { localStorage.removeItem(CACHE_PREFIX + sym); } catch(_) {} }
      saveState();
      renderInputs();
    });
  });

  // API key
  $('#avKey').addEventListener('input', e => {
    state.avKey = e.target.value.trim();
    saveState();
  });

  // Ticker fetch
  const doFetch = async () => {
    const tickerInput = $('#tickerInput');
    const symbol = (tickerInput.value || '').trim().toUpperCase();
    const status = $('#fetchStatus');
    if (!symbol) { status.className = 'fetch-status error'; status.textContent = 'Enter a ticker symbol.'; return; }
    if (!state.avKey) { status.className = 'fetch-status error'; status.textContent = 'Add your Alpha Vantage key on the right →'; return; }
    status.className = 'fetch-status loading';
    status.textContent = `Fetching ${symbol}…`;
    try {
      const onProgress = (fn, n, total) => {
        status.textContent = `Fetching ${symbol} · ${fn} (${n}/${total})…`;
      };
      const { ticker, fromCache } = await handleFetch(symbol, state.avKey, onProgress, { includeMomentum: schoolUses('momentum') });
      const existing = state.tickers.findIndex(t => (t.ticker || '').toUpperCase() === symbol);
      if (existing >= 0) {
        state.tickers[existing] = ticker;
      } else {
        state.tickers.unshift(ticker);
      }
      saveState();
      const s = summarize(ticker);
      status.className = 'fetch-status success';
      const verdict = s.overall || 'NO VERDICT';
      const tag = fromCache ? ' (cached)' : '';
      status.textContent = `✓ ${symbol} · ${ticker.sector || 'Unknown sector'} · ${verdict}${tag}`;
      tickerInput.value = '';
      renderInputs();
    } catch (err) {
      status.className = 'fetch-status error';
      status.textContent = '✕ ' + (err.message || 'Fetch failed');
    }
  };
  $('#fetchBtn').addEventListener('click', doFetch);
  $('#tickerInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); doFetch(); }
  });
  // Auto-focus ticker input for quick entry
  setTimeout(() => $('#tickerInput')?.focus(), 50);

  // Other buttons
  $('#addTicker').addEventListener('click', () => {
    const blank = {}; INPUT_KEYS.forEach(k => blank[k] = null);
    blank.ticker = ''; blank.name = ''; blank.sector = '';
    state.tickers.push(blank);
    saveState(); renderInputs();
  });
  $('#loadSample').addEventListener('click', () => {
    if (state.tickers.length && !confirm('Replace existing tickers with sample data?')) return;
    state.tickers = SAMPLE_TICKERS.map(t => ({ ...t }));
    saveState(); renderInputs();
  });
  $('#removeRejects').addEventListener('click', () => {
    const keep = [];
    const dropped = [];
    state.tickers.forEach(t => {
      if (summarize(t).overall === 'REJECT') dropped.push(t); else keep.push(t);
    });
    if (!dropped.length) {
      const status = $('#fetchStatus');
      status.className = 'fetch-status';
      status.textContent = 'No rejected tickers to remove.';
      return;
    }
    if (!confirm(`Remove ${dropped.length} rejected ticker(s)?`)) return;
    dropped.forEach(t => {
      const sym = (t.ticker || '').toUpperCase();
      if (sym) { try { localStorage.removeItem(CACHE_PREFIX + sym); } catch(_) {} }
    });
    state.tickers = keep;
    saveState(); renderInputs();
  });
  $('#clearAll').addEventListener('click', () => {
    if (!confirm('Clear all ticker rows?')) return;
    // Also purge AV caches so subsequent fetches are fresh
    state.tickers.forEach(t => {
      const sym = (t.ticker || '').toUpperCase();
      if (sym) { try { localStorage.removeItem(CACHE_PREFIX + sym); } catch(_) {} }
    });
    state.tickers = [];
    saveState(); renderInputs();
  });
  $('#exportCsv').addEventListener('click', exportCsv);
  $('#importCsv').addEventListener('click', () => $('#csvFile').click());
  $('#csvFile').addEventListener('change', importCsv);
}

function refreshVerdict(rowIdx) {
  const cell = document.querySelector(`#panel-inputs td[data-verdict="${rowIdx}"]`);
  if (!cell) return;
  const s = summarize(state.tickers[rowIdx]);
  cell.innerHTML = pillFor(s.overall);
}

function refreshInputsStats() {
  const verdicts = state.tickers.map(t => summarize(t).overall);
  const buys = verdicts.filter(v => v === 'BUY').length;
  const watches = verdicts.filter(v => v === 'WATCH').length;
  const rejects = verdicts.filter(v => v === 'REJECT').length;
  const setText = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
  setText('statTickers', state.tickers.length);
  setText('statBuy', buys);
  setText('statWatch', watches);
  setText('statReject', rejects);
}

function exportCsv() {
  const fields = INPUT_KEYS;
  const lines = [fields.join(',')];
  state.tickers.forEach(t => {
    lines.push(fields.map(k => {
      const v = t[k];
      if (v === null || v === undefined) return '';
      const s = String(v);
      return /[,"\n]/.test(s) ? '"' + s.replace(/"/g,'""') + '"' : s;
    }).join(','));
  });
  const blob = new Blob([lines.join('\n')], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'tickers.csv'; a.click();
  URL.revokeObjectURL(url);
}

function importCsv(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    const text = reader.result;
    const rows = parseCsv(text);
    if (rows.length < 2) { alert('CSV must have header + at least one row.'); return; }
    const header = rows[0];
    const newTickers = rows.slice(1).map(cols => {
      const t = {};
      INPUT_KEYS.forEach(k => t[k] = null);
      header.forEach((h, i) => {
        if (INPUT_KEYS.includes(h)) {
          const v = cols[i];
          const f = INPUT_GROUPS.flatMap(g=>g.items).find(it=>it.key===h);
          if (f && f.type !== 'text' && f.type !== 'yn' && f.type !== 'moat') {
            t[h] = parseNumber(v);
          } else {
            t[h] = v || null;
          }
        }
      });
      return t;
    });
    if (!confirm(`Replace ${state.tickers.length} ticker(s) with ${newTickers.length} imported?`)) return;
    state.tickers = newTickers;
    saveState(); renderInputs();
  };
  reader.readAsText(file);
  e.target.value = '';
}

function parseCsv(text) {
  const rows = [];
  let row = [], cell = '', inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQ) {
      if (c === '"' && text[i+1] === '"') { cell += '"'; i++; }
      else if (c === '"') { inQ = false; }
      else cell += c;
    } else {
      if (c === '"') inQ = true;
      else if (c === ',') { row.push(cell); cell = ''; }
      else if (c === '\n') { row.push(cell); rows.push(row); row = []; cell = ''; }
      else if (c === '\r') {}
      else cell += c;
    }
  }
  if (cell !== '' || row.length) { row.push(cell); rows.push(row); }
  return rows;
}

function renderScoring(tab) {
  const root = $(`#panel-${tab}`);
  let title, sub, stage, gates, ynGates = [], extraCol = null;
  if (tab === 'quality') {
    title = `<em>Quality</em> screen`; stage = 'Stage 1 + 2'; sub = 'Universe filters plus profitability, balance-sheet, capital-allocation and durability gates. A ticker passes only when every gate clears.';
    gates = [...UNIVERSE_GATES.map(g => ({ ...g, group: 'Universe' })), ...QUALITY_GATES.map(g => ({ ...g, group: 'Quality' }))];
  } else if (tab === 'valuation') {
    title = `<em>Valuation</em> screen`; stage = 'Stage 3'; sub = 'Six lenses on price. Requires N passes (per profile) plus minimum Margin of Safety vs. your intrinsic value.';
    gates = VALUATION_GATES.map(g => ({ ...g, group: 'Valuation' }));
  } else if (tab === 'redflags') {
    title = `Red <em>Flags</em>`; stage = 'Stage 4'; sub = 'Forensic checks. ANY tripped flag rejects the ticker.';
    gates = REDFLAG_GATES.map(g => ({ ...g, group: 'Forensic' }));
    ynGates = REDFLAG_YN_GATES;
  } else if (tab === 'momentum') {
    title = `<em>Momentum</em> screen`; stage = 'Stage 3M'; sub = 'Price-based confirmation. Six trend signals — requires N passes (per profile). Auto-fetched from daily price history; analyst-driven fields default to neutral.';
    gates = MOMENTUM_GATES.map(g => ({ ...g, group: 'Momentum' }));
  } else if (tab === 'scenario') {
    return renderScenario();
  }

  const allGates = [...gates, ...ynGates];

  const head = `
    <tr>
      <th class="idx"></th>
      <th class="left">Ticker</th>
      <th class="left">Name</th>
      ${allGates.map(g => {
        const def = defFor(g.metric) || g.label;
        return `<th title="${safeText(def)}">${safeText(g.label)}</th>`;
      }).join('')}
      <th title="Number of gates that passed out of those with usable data.">Passes</th>
      ${tab === 'valuation' ? `<th title="${safeText(defFor('mos_min'))}">MoS</th><th title="Does Margin of Safety meet the profile threshold?">MoS OK</th>` : ''}
      <th title="PASS if every evaluable gate cleared; FAIL otherwise.">Verdict</th>
    </tr>`;

  const body = state.tickers.length ? state.tickers.map((t, idx) => {
    let evaluated;
    if (tab === 'quality') evaluated = [...evalUniverse(t), ...evalQuality(t)];
    else if (tab === 'valuation') evaluated = evalValuation(t);
    else if (tab === 'momentum') evaluated = evalMomentum(t);
    else if (tab === 'redflags') evaluated = evalRedFlags(t);

    const cells = evaluated.map(g => gateCell(g)).join('');
    const total = evaluated.length;
    const passes = passCount(evaluated);
    const ev = totalEvaluable(evaluated);
    let verdict;
    let passText = ev === 0 ? '<span class="dim">—</span>' : `${passes}/${total}`;
    let mosCells = '';
    if (tab === 'valuation') {
      const v = valuationResult(t);
      verdict = v.result;
      const mos = v.mos;
      const mosOk = v.mosOk;
      mosCells = `
        <td class="numeric ${mos===null?'dim':''}">${mos===null?'—':fmt(mos,'pct')}</td>
        <td>${mosOk===null?pillFor(null):mosOk?pillFor('PASS'):pillFor('FAIL')}</td>`;
    } else if (tab === 'momentum') {
      verdict = momentumResult(t).result;
    } else {
      verdict = ev === 0 ? null : (passes === ev ? 'PASS' : 'FAIL');
    }
    return `<tr>
      <td class="idx">${idx+1}</td>
      ${tickerCell(t)}
      <td class="left dim">${safeText(t.name || '')}</td>
      ${cells}
      <td class="numeric">${passText}</td>
      ${mosCells}
      <td>${pillFor(verdict)}</td>
    </tr>`;
  }).join('') : `<tr><td colspan="${5 + allGates.length + (tab==='valuation'?2:0)}" class="empty-state"><div class="title">No tickers</div>Add rows on the Inputs tab.</td></tr>`;

  // Summary stat strip
  const sums = state.tickers.map(t => {
    if (tab === 'quality') {
      const arr = [...evalUniverse(t), ...evalQuality(t)];
      return { ev: totalEvaluable(arr), res: stageResult(arr) };
    }
    if (tab === 'valuation') {
      const v = valuationResult(t);
      return { ev: totalEvaluable(evalValuation(t)), res: v.result };
    }
    if (tab === 'momentum') {
      const m = momentumResult(t);
      return { ev: totalEvaluable(evalMomentum(t)), res: m.result };
    }
    if (tab === 'redflags') {
      const arr = evalRedFlags(t);
      return { ev: totalEvaluable(arr), res: stageResult(arr) };
    }
  });
  const evaluatedCount = sums.filter(s => s && s.ev > 0).length;
  const passCt = sums.filter(s => s && s.res === 'PASS').length;
  const failCt = sums.filter(s => s && s.res === 'FAIL').length;

  root.innerHTML = `
    <div class="panel-header">
      <div>
        <div class="stage">${stage}</div>
        <h2>${title}</h2>
        <p>${sub}</p>
      </div>
    </div>
    <div class="stat-strip">
      <div class="stat"><div class="k">Tickers</div><div class="v mono">${state.tickers.length}</div></div>
      <div class="stat"><div class="k">Evaluable</div><div class="v mono">${evaluatedCount}</div></div>
      <div class="stat"><div class="k">Passing</div><div class="v mono pass">${passCt}</div></div>
      <div class="stat"><div class="k">Failing</div><div class="v mono fail">${failCt}</div></div>
      <div class="stat"><div class="k">Profile</div><div class="v"><em>${state.profile}</em></div></div>
    </div>
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead>${head}</thead>
          <tbody>${body}</tbody>
        </table>
      </div>
    </div>`;
}
